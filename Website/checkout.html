<body>

<div class="card">

  <h2>Checkout</h2>

  <div class="info" id="info"></div>

  <button onclick="pay()">Pay Now</button>

  <button class="back" onclick="back()">
    Back
  </button>

</div>

<script>
const info = document.getElementById("info");

const saved = localStorage.getItem("signup");

console.log("Loaded localStorage:", saved);

if (!saved) {

  info.innerHTML = `
    No signup data found.<br><br>
    Please go back and sign up first.
  `;

} else {

  const data = JSON.parse(saved);

  info.innerHTML = `
    <strong>Email:</strong> ${data.email}<br>
    <strong>Phone:</strong> ${data.phone}<br>
    <strong>SMS Opt-in:</strong> ${data.smsOptin}<br>
    <strong>Email Opt-in:</strong> ${data.emailOptin}
  `;
}

function pay() {
  alert("Mock payment successful.");
}

function back() {
  window.location.href = "/index.html";
}
</script>

</body>
</html>

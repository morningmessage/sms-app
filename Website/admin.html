<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 32px;
      border-radius: 14px;
      border: 2px solid #8574a3;
      text-align: center;
      width: 320px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h2 {
      color: #628c7b;
      margin-bottom: 20px;
    }

    input {
      width: 92%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #628c7b;
      color: white;
      padding: 12px;
      border: none;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      transition: 0.2s ease;
    }

    button:hover {
      background: #8574a3;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 12px;
      font-size: 13px;
      color: #444;
      min-height: 18px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Admin Login</h2>

  <input 
    id="pw" 
    type="password" 
    placeholder="Enter admin password" 
  />

  <button id="loginBtn" onclick="login()">
    Login
  </button>

  <div id="msg"></div>

</div>

<script>
const API_BASE = "https://sms-app-krz3.onrender.com";

async function login() {

  const password = document.getElementById("pw").value;
  const msg = document.getElementById("msg");
  const btn = document.getElementById("loginBtn");

  msg.innerText = "";
  btn.disabled = true;
  btn.innerText = "Logging in...";

  try {

    const res = await fetch(`${API_BASE}/admin-login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ password })
    });

    const data = await res.json().catch(() => ({}));

    if (res.ok) {

      localStorage.setItem("admin", "true");

      msg.innerText = "Login successful!";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 800);

    } else {

      msg.innerText = data.message || "Wrong password";

    }

  } catch (err) {

    console.error(err);
    msg.innerText = "Could not connect to server.";

  } finally {
    btn.disabled = false;
    btn.innerText = "Login";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>

  <div id="msg"></div>
</div>

<script>
async function checkout() {

  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const smsOptin = document.getElementById("smsOptin").checked;
  const emailOptin = document.getElementById("emailOptin").checked;
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if (!email || !phone) {
    msg.innerText = "Please fill all fields.";
    return;
  }

  if (!smsOptin && !emailOptin) {
    msg.innerText = "Please select at least one opt-in.";
    return;
  }

  const signupData = {
    email,
    phone,
    smsOptin,
    emailOptin,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
  };

  try {

    const response = await fetch("https://sms-app-krz3.onrender.com/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(signupData)
    });

    if (!response.ok) {
      throw new Error("Signup failed");
    }

    // SAVE LOCALLY
    localStorage.setItem("signup", JSON.stringify(signupData));

    console.log("Saved signup locally:", signupData);

    msg.innerText = "Signup successful!";

    // WAIT BEFORE REDIRECT
    setTimeout(() => {
      window.location.href = "/checkout.html";
    }, 1200);

  } catch (error) {

    console.error(error);

    msg.innerText = "Could not connect to server.";
  }
}
</script>

</body>
</html>

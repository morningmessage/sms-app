<!DOCTYPE html>
<html>
<head>
  <title>SMS Pilot</title>

  <style>
    :root {
      --green: #628c7b;
      --purple: #8574a3;
      --bg: #f6f6f8;
      --text: #2b2b2b;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 14px;
      width: 360px;
      text-align: center;
      border: 2px solid var(--purple);
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      color: var(--green);
      margin-bottom: 5px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin: 10px 5px;
      color: var(--text);
      text-align: left;
    }

    .checkbox input {
      width: auto;
      margin: 0;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: var(--green);
      color: white;
      transition: 0.2s ease;
      font-size: 15px;
    }

    button:hover {
      background: var(--purple);
    }

    #msg {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text);
      min-height: 18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>SMS Pilot</h1>
  <p>Enroll now to get access</p>

  <input id="email" type="email" placeholder="Email" />
  <input id="phone" type="tel" placeholder="Phone number" />

  <div class="checkbox">
    <input type="checkbox" id="smsOptin" />
    <label for="smsOptin">
      I agree to receive SMS messages
    </label>
  </div>

  <div class="checkbox">
    <input type="checkbox" id="emailOptin" />
    <label for="emailOptin">
      I agree to receive email updates
    </label>
  </div>

  <button onclick="checkout()">Enroll Now</button>

  <div id="msg"></div>
</div>

<script>
async function checkout() {

  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const smsOptin = document.getElementById("smsOptin").checked;
  const emailOptin = document.getElementById("emailOptin").checked;
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if (!email || !phone) {
    msg.innerText = "Please fill all fields.";
    return;
  }

  if (!smsOptin && !emailOptin) {
    msg.innerText = "Please select at least one opt-in.";
    return;
  }

  try {

    const response = await fetch("https://sms-app-krz3.onrender.com/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        phone,
        smsOptin,
        emailOptin,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
      })
    });

    const data = await response.json();

    console.log(data);

    msg.innerText = "Signup successful!";

    setTimeout(() => {
      window.location.href = "checkout.html";
    }, 1000);

  } catch (error) {

    console.error(error);

    msg.innerText = "Could not connect to server.";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMS Pilot</title>

<style>

:root {
  --green: #628c7b;
  --purple: #8574a3;
  --bg: #f6f6f8;
  --text: #2b2b2b;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.card {
  background: white;
  padding: 32px;
  border-radius: 14px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  border: 2px solid var(--purple);
}

h1 { color: var(--green); }

input, select {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.phone-row {
  display: flex;
  gap: 8px;
}

.phone-row select {
  width: 120px;
}

.phone-row input {
  flex: 1;
}

.checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: var(--green);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#msg {
  margin-top: 10px;
  font-size: 13px;
}

</style>

</head>

<body>

<div class="card">

<h1>SMS Pilot</h1>

<input id="firstName" placeholder="First Name" />
<input id="lastName" placeholder="Last Name" />
<input id="email" placeholder="Email" />

<div class="phone-row">

<select id="countryCode">
<option value="+1">+1 USA</option>
<option value="+44">+44 UK</option>
<option value="+61">+61 AUS</option>
<option value="+49">+49 DE</option>
</select>

<input id="phone" placeholder="Phone number" />

</div>

<div class="checkbox">
<input type="checkbox" id="smsOptin" />
<label>SMS opt-in</label>
</div>

<div class="checkbox">
<input type="checkbox" id="emailOptin" />
<label>Email opt-in</label>
</div>

<button onclick="checkout()">Sign Up</button>

<div id="msg"></div>

</div>

<script>

async function checkout() {

const msg = document.getElementById("msg");

const firstName = document.getElementById("firstName").value.trim();
const lastName = document.getElementById("lastName").value.trim();
const email = document.getElementById("email").value.trim();

const countryCode = document.getElementById("countryCode").value;
const phoneRaw = document.getElementById("phone").value.trim();

const smsOptin = document.getElementById("smsOptin").checked;
const emailOptin = document.getElementById("emailOptin").checked;

if (!firstName || !lastName || !email || !phoneRaw) {
msg.innerText = "Fill all fields";
return;
}

if (!email.includes("@")) {
msg.innerText = "Invalid email";
return;
}

if (!smsOptin && !emailOptin) {
msg.innerText = "Select opt-in";
return;
}

const phone = countryCode + phoneRaw.replace(/\D/g, "");

const res = await fetch("https://sms-app-krz3.onrender.com/signup", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
firstName,
lastName,
email,
phone,
smsOptin,
emailOptin
})
});

const data = await res.json();

if (!res.ok) {
msg.innerText = data.message;
return;
}

localStorage.setItem("signup", JSON.stringify({firstName,lastName,email,phone}));

msg.innerText = "Success!";

setTimeout(() => {
window.location.href = "checkout.html";
}, 1000);

}

</script>

</body>
</html>

<html>
<head>
  <link rel="stylesheet" href="css/style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMS Pilot</title>

</head>

<body>

<div class="card">

<h1>SMS Pilot</h1>

<input id="firstName" placeholder="First Name" />
<input id="lastName" placeholder="Last Name" />
<input id="email" placeholder="Email" />

<div class="phone-row">

<option value="+31">🇳🇱 +31 (Netherlands)</option>
<option value="+32">🇧🇪 +32 (Belgium)</option>
<option value="+33">🇫🇷 +33 (France)</option>
<option value="+34">🇪🇸 +34 (Spain)</option>
<option value="+36">🇭🇺 +36 (Hungary)</option>
<option value="+39">🇮🇹 +39 (Italy)</option>

<option value="+40">🇷🇴 +40 (Romania)</option>
<option value="+41">🇨🇭 +41 (Switzerland)</option>
<option value="+43">🇦🇹 +43 (Austria)</option>
<option value="+44">🇬🇧 +44 (UK)</option>
<option value="+45">🇩🇰 +45 (Denmark)</option>
<option value="+46">🇸🇪 +46 (Sweden)</option>
<option value="+47">🇳🇴 +47 (Norway)</option>
<option value="+48">🇵🇱 +48 (Poland)</option>
<option value="+49">🇩🇪 +49 (Germany)</option>

<option value="+51">🇵🇪 +51 (Peru)</option>
<option value="+52">🇲🇽 +52 (Mexico)</option>
<option value="+53">🇨🇺 +53 (Cuba)</option>
<option value="+54">🇦🇷 +54 (Argentina)</option>
<option value="+55">🇧🇷 +55 (Brazil)</option>

<option value="+60">🇲🇾 +60 (Malaysia)</option>
<option value="+61">🇦🇺 +61 (Australia)</option>
<option value="+62">🇮🇩 +62 (Indonesia)</option>
<option value="+63">🇵🇭 +63 (Philippines)</option>
<option value="+64">🇳🇿 +64 (New Zealand)</option>
<option value="+65">🇸🇬 +65 (Singapore)</option>
<option value="+66">🇹🇭 +66 (Thailand)</option>

<option value="+81">🇯🇵 +81 (Japan)</option>
<option value="+82">🇰🇷 +82 (South Korea)</option>
<option value="+84">🇻🇳 +84 (Vietnam)</option>
<option value="+86">🇨🇳 +86 (China)</option>
<option value="+90">🇹🇷 +90 (Turkey)</option>

<option value="+91">🇮🇳 +91 (India)</option>
<option value="+92">🇵🇰 +92 (Pakistan)</option>
<option value="+93">🇦🇫 +93 (Afghanistan)</option>
<option value="+94">🇱🇰 +94 (Sri Lanka)</option>

<option value="+98">🇮🇷 +98 (Iran)</option>

<option value="+211">🇸🇸 +211 (South Sudan)</option>

<option value="+254">🇰🇪 +254 (Kenya)</option>
<option value="+255">🇹🇿 +255 (Tanzania)</option>
<option value="+256">🇺🇬 +256 (Uganda)</option>

</select>

<input id="phone" placeholder="Phone number" />

</div>

<div class="checkbox">
<input type="checkbox" id="smsOptin" />
<label>SMS opt-in</label>
</div>

<div class="checkbox">
<input type="checkbox" id="emailOptin" />
<label>Email opt-in</label>
</div>

<button onclick="checkout()">Sign Up</button>

<div id="msg"></div>

</div>

<script>

async function checkout() {

const msg = document.getElementById("msg");

const firstName = document.getElementById("firstName").value.trim();
const lastName = document.getElementById("lastName").value.trim();
const email = document.getElementById("email").value.trim();

const countryCode = document.getElementById("countryCode").value;
const phoneRaw = document.getElementById("phone").value.trim();

const smsOptin = document.getElementById("smsOptin").checked;
const emailOptin = document.getElementById("emailOptin").checked;

if (!firstName || !lastName || !email || !phoneRaw) {
msg.innerText = "Fill all fields";
return;
}

if (!email.includes("@")) {
msg.innerText = "Invalid email";
return;
}

if (!smsOptin && !emailOptin) {
msg.innerText = "Select opt-in";
return;
}

const phone = countryCode + phoneRaw.replace(/\D/g, "");

const res = await fetch("https://sms-app-krz3.onrender.com/signup", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
firstName,
lastName,
email,
phone,
smsOptin,
emailOptin
})
});

const data = await res.json();

if (!res.ok) {
msg.innerText = data.message;
return;
}

localStorage.setItem("signup", JSON.stringify({firstName,lastName,email,phone}));

msg.innerText = "Success!";

setTimeout(() => {
window.location.href = "checkout.html";
}, 1000);

}

</script>

</body>
</html>

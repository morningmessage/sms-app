<!DOCTYPE html>
<html>
<head>
  <title>SMS Pilot</title>

  <style>
    :root {
      --green: #628c7b;
      --purple: #8574a3;
      --bg: #f6f6f8;
      --text: #2b2b2b;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 14px;
      width: 360px;
      text-align: center;
      border: 2px solid var(--purple);
    }

    h1 {
      color: var(--green);
      margin-bottom: 5px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin: 10px 5px;
      color: var(--text);
      text-align: left;
    }

    .checkbox input {
      width: auto;
      margin: 0;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: var(--green);
      color: white;
      transition: 0.2s ease;
    }

    button:hover {
      background: var(--purple);
    }

    #msg {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text);
    }
  </style>
</head>

<body>

<div class="card">
  <h1>SMS Pilot</h1>
  <p>Enroll now to get access</p>

  <input id="email" placeholder="Email" />
  <input id="phone" placeholder="Phone number" />

  <div class="checkbox">
    <input type="checkbox" id="smsOptin" />
    <label for="smsOptin">I agree to receive SMS messages</label>
  </div>

  <div class="checkbox">
    <input type="checkbox" id="emailOptin" />
    <label for="emailOptin">I agree to receive email updates</label>
  </div>

  <button onclick="checkout()">Enroll Now</button>

  <div id="msg"></div>
</div>

<script>
function checkout() {
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const smsOptin = document.getElementById("smsOptin").checked;
  const emailOptin = document.getElementById("emailOptin").checked;
  const msg = document.getElementById("msg");
  timezone: Intl.DateTimeFormat().resolvedOptions().timeZone

  if (!email || !phone) {
    msg.innerText = "Please fill all fields.";
    return;
  }

  if (!smsOptin && !emailOptin) {
    msg.innerText = "Please select at least one opt-in.";
    return;
  }

  localStorage.setItem("signup", JSON.stringify({
    email,
    phone,
    smsOptin,
    emailOptin
  }));

  window.location.href = "checkout.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body {
font-family: Arial;
padding: 20px;
background: #f6f6f8;
}

.card {
background: white;
padding: 15px;
margin: 10px 0;
border-radius: 10px;
}

input {
width: 100%;
margin: 5px 0;
padding: 8px;
}

button {
margin-top: 5px;
padding: 8px;
border: none;
cursor: pointer;
}

.save { background: #628c7b; color: white; }
.delete { background: #b04b5a; color: white; }

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div id="list"></div>

<script>

async function load() {

const res = await fetch("https://sms-app-krz3.onrender.com/users");
const users = await res.json();

document.getElementById("list").innerHTML =
users.map(u => `
<div class="card">

<input id="fn-${u.id}" value="${u.firstName || ""}" />
<input id="ln-${u.id}" value="${u.lastName || ""}" />
<input id="em-${u.id}" value="${u.email}" />
<input id="ph-${u.id}" value="${u.phone}" />

<button class="save" onclick="save(${u.id})">Save</button>
<button class="delete" onclick="del(${u.id})">Delete</button>

</div>
`).join("");

}

async function save(id) {

await fetch("https://sms-app-krz3.onrender.com/users/update", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
id,
firstName: document.getElementById("fn-"+id).value,
lastName: document.getElementById("ln-"+id).value,
email: document.getElementById("em-"+id).value,
phone: document.getElementById("ph-"+id).value
})
});

alert("Saved");

}

async function del(id) {

await fetch("https://sms-app-krz3.onrender.com/users/delete", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({id})
});

load();

}

load();

</script>

</body>
</html>
